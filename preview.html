<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Maryam ❤️</title>

<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#ffdde1,#ee9ca7);
min-height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.page{
text-align:center;
width:100%;
max-width:700px;
transition:.5s;
}

.hidden{
display:none;
}

h1{
font-size:clamp(2rem,7vw,3.5rem);
margin-bottom:20px;
color:#fff;
text-shadow:2px 2px 10px rgba(0,0,0,.2);
}

h2{
font-size:clamp(1.5rem,6vw,2.8rem);
margin-bottom:35px;
color:white;
}

button{
padding:16px 34px;
font-size:clamp(1rem,4vw,1.4rem);
border:none;
border-radius:50px;
cursor:pointer;
transition:.25s;
margin:12px;
min-width:140px;
}

button:hover{
transform:scale(1.06);
}

#yes{
background:#4CAF50;
color:white;
}

#no{
background:#ff4d4d;
color:white;
position:fixed;
z-index:100;
}

.shake{
animation:shake .35s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
75%{transform:translateX(-6px);}
100%{transform:translateX(0);}
}

#angry{
font-size:clamp(3rem,12vw,5rem);
margin-bottom:15px;
opacity:0;
transition:.3s;
}

#celebration{
display:none;
position:fixed;
inset:0;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(255,255,255,.15);
backdrop-filter:blur(6px);
text-align:center;
padding:20px;
}

#celebration h1{
font-size:clamp(2.3rem,8vw,4rem);
animation:pop .8s infinite alternate;
}

@keyframes pop{
from{transform:scale(1);}
to{transform:scale(1.08);}
}

.heart{
position:absolute;
pointer-events:none;
animation:float 4s linear forwards;
}

@keyframes float{
0%{
transform:translateY(0) scale(.5);
opacity:1;
}
100%{
transform:translateY(-100vh) scale(2);
opacity:0;
}
}

.confetti{
position:absolute;
width:10px;
height:18px;
animation:fall linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-20px) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(720deg);
}
}

@media(max-width:600px){

button{
display:block;
width:80%;
margin:12px auto;
}

#no{
width:160px;
}
}
</style>
</head>
<body>

<div id="page1" class="page">
<h1>Hi, Maryam! ❤️</h1>

<button id="start">
Hi 👋
</button>
</div>


<div id="page2" class="page hidden">

<div id="angry">😠</div>

<h2>Do you love me? ❤️🥺</h2>

<button id="yes">
YES ❤️
</button>

<button id="no">
NO 🙄
</button>

</div>

<div id="celebration">

<h1>🎉 YEAHHHH!! 🎉</h1>

<h2>I KNEW YOU LOVE ME ❤️🥹</h2>

</div>

<script>

const page1=document.getElementById("page1");
const page2=document.getElementById("page2");

document.getElementById("start").onclick=()=>{

page1.classList.add("hidden");
page2.classList.remove("hidden");

const yes=document.getElementById("yes");

const rect=yes.getBoundingClientRect();

no.style.left=(rect.right+20)+"px";
no.style.top=rect.top+"px";

}
/////////
const no=document.getElementById("no");
const angry=document.getElementById("angry");

let tries=0;

const messages=[
"😠",
"😡",
"🤨",
"NOPE!",
"Try Again 😤",
"Wrong Button 😑"
];

function moveButton(){

tries++;

angry.style.opacity=1;
angry.innerHTML=messages[Math.min(tries-1,messages.length-1)];

const maxX=window.innerWidth-no.offsetWidth-20;
const maxY=window.innerHeight-no.offsetHeight-20;

const x=Math.random()*maxX;
const y=Math.random()*maxY;

no.style.left=x+"px";
no.style.top=y+"px";

no.classList.add("shake");

setTimeout(()=>{
no.classList.remove("shake");
},300);

}

// Desktop
no.addEventListener("mouseenter",moveButton);

// Mobile
no.addEventListener("touchstart",(e)=>{
e.preventDefault();
moveButton();
});

// Just in case someone somehow clicks it
no.addEventListener("click",(e)=>{
e.preventDefault();
moveButton();
});
/////////
document.getElementById("yes").onclick=()=>{

page2.style.display="none";

document.getElementById("celebration").style.display="flex";

createHearts();
createConfetti();

}

function createHearts(){

const emojis=["❤️","💖","💕","💘","💝","🥰"];

setInterval(()=>{

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

heart.style.left=Math.random()*100+"vw";

heart.style.bottom="-50px";

heart.style.fontSize=(25+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),4000);

},120);

}

function createConfetti(){

const colors=[
"#ff3b3b",
"#ffd93d",
"#6bcB77",
"#4d96ff",
"#ff6ec7",
"#ffffff"
];

for(let i=0;i<250;i++){

const c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=colors[Math.floor(Math.random()*colors.length)];

c.style.animationDuration=(3+Math.random()*3)+"s";

c.style.animationDelay=Math.random()*2+"s";

document.body.appendChild(c);

}

}

</script>

</body>
</html>
