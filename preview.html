<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Maryam ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#ffdde1,#ee9ca7);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.page{
text-align:center;
transition:.5s;
}

.hidden{
display:none;
}

h1{
font-size:55px;
margin-bottom:20px;
color:#fff;
text-shadow:2px 2px 10px rgba(0,0,0,.2);
}

h2{
font-size:45px;
margin-bottom:40px;
color:white;
}

button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:50px;
cursor:pointer;
transition:.3s;
margin:10px;
}

button:hover{
transform:scale(1.08);
}

#yes{
background:#4CAF50;
color:white;
}

#no{
background:#ff4d4d;
color:white;
position:relative;
}

.shake{
animation:shake .35s infinite;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
75%{transform:translateX(-6px);}
100%{transform:translateX(0);}
}

#angry{
font-size:70px;
margin-bottom:20px;
opacity:0;
transition:.4s;
}

#celebration{
display:none;
position:absolute;
inset:0;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(255,255,255,.15);
backdrop-filter:blur(5px);
}

#celebration h1{
font-size:60px;
animation:pop .8s infinite alternate;
}

@keyframes pop{
from{transform:scale(1);}
to{transform:scale(1.08);}
}

.heart{
position:absolute;
font-size:30px;
animation:float 4s linear forwards;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(0) scale(.5);
opacity:1;
}
100%{
transform:translateY(-800px) scale(2);
opacity:0;
}
}

.confetti{
position:absolute;
width:10px;
height:18px;
animation:fall linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-20px) rotate(0);
}
100%{
transform:translateY(110vh) rotate(720deg);
}
}

</style>
</head>
<body>

<div id="page1" class="page">
<h1>Hi, Maryam! ❤️</h1>

<button id="start">
Hi 👋
</button>
</div>


<div id="page2" class="page hidden">

<div id="angry">😠</div>

<h2>Do you love me? ❤️🥺</h2>

<button id="yes">
YES ❤️
</button>

<button id="no">
NO 🙄
</button>

</div>

<div id="celebration">

<h1>🎉 YEAHHHH!! 🎉</h1>

<h2>I KNEW YOU LOVE ME ❤️🥹</h2>

</div>

<script>

const page1=document.getElementById("page1");
const page2=document.getElementById("page2");

document.getElementById("start").onclick=()=>{
page1.classList.add("hidden");
page2.classList.remove("hidden");
}

const no=document.getElementById("no");
const angry=document.getElementById("angry");

let tries=0;

no.addEventListener("mouseenter",()=>{
tries++;

angry.style.opacity=1;

const messages=[
"😠",
"😡",
"🤨",
"NOPE!",
"Try Again 😤",
"Wrong Button 😑"
];

angry.innerHTML=messages[Math.min(tries-1,messages.length-1)];

no.classList.add("shake");

setTimeout(()=>{
no.classList.remove("shake");
},500);

});

no.addEventListener("click",(e)=>{
e.preventDefault();

no.classList.add("shake");

setTimeout(()=>{
no.classList.remove("shake");
},500);
});

document.getElementById("yes").onclick=()=>{

page2.style.display="none";

document.getElementById("celebration").style.display="flex";

createHearts();
createConfetti();

}

function createHearts(){

const emojis=["❤️","💖","💕","💘","💝","🥰"];

setInterval(()=>{

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

heart.style.left=Math.random()*100+"vw";

heart.style.bottom="-50px";

heart.style.fontSize=(25+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),4000);

},120);

}

function createConfetti(){

const colors=[
"#ff3b3b",
"#ffd93d",
"#6bcB77",
"#4d96ff",
"#ff6ec7",
"#ffffff"
];

for(let i=0;i<250;i++){

const c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=colors[Math.floor(Math.random()*colors.length)];

c.style.animationDuration=(3+Math.random()*3)+"s";

c.style.animationDelay=Math.random()*2+"s";

document.body.appendChild(c);

}

}

</script>

</body>
</html>
